<div style="font-family: Arial, sans-serif; max-width: 480px; margin: 0 auto; padding: 24px; color: #1f2937;">
  <h2 style="color: #0b3d2e; margin-bottom: 8px;">Recuperação de palavra-passe</h2>
  <p>Olá <strong>{{ username }}</strong>,</p>
  <p>Recebemos um pedido para repor a palavra-passe da sua conta. Use o código abaixo para concluir o processo:</p>
  <div style="margin: 24px 0; text-align: center;">
    <div style="display: inline-block; padding: 14px 28px; background: #f3faf6; border: 1px solid #1f8f5b; border-radius: 10px; font-size: 28px; letter-spacing: 8px; font-weight: 700; color: #0b3d2e;">
      {{ code }}
    </div>
  </div>
  <p style="color: #6b7280; font-size: 14px;">Este código é válido por <strong>{{ ttl_minutes }} minutos</strong>. Se não foi você que pediu, pode ignorar este email.</p>
  <p style="margin-top: 24px;">Obrigado,<br>Equipa MPD</p>
</div>
